name: CI/CD — Build and Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 930067562579.dkr.ecr.us-east-1.amazonaws.com
  PROJECT_NAME: medication-delivery

jobs:
  # ─── Build and Push all Docker images ───────────────────────────────────────
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
          - service: auth-service
            context: ./services/auth-service
          - service: order-service
            context: ./services/order-service
          - service: delivery-service
            context: ./services/delivery-service
          - service: notification-service
            context: ./services/notification-service
          - service: pharmacy-service
            context: ./services/pharmacy-service
          - service: frontend
            context: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' }}  # Only push on main, not PRs
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:${{ github.sha }}

  # ─── Notify on success ───────────────────────────────────────────────────────
  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Summary
        run: |
          echo "## ✅ Deployment successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Images pushed to ECR:** 7" >> $GITHUB_STEP_SUMMARY